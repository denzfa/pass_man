spring:
  datasource:
    url: jdbc:h2:mem:passman;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# The resource server config is not loaded in the web-layer slice tests,
# which mock authentication directly. issuer-uri is therefore not required here.
