spring:
  application:
    name: passwords-manager

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # OAuth 2.1 Authorization Server. The resource server discovers the
          # JWK set and validates the issuer via the well-known metadata endpoint.
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000}

# Claim inside the access token that carries the granted roles.
# Each value is prefixed with ROLE_ to become a Spring Security authority.
app:
  security:
    roles-claim: roles

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    root: ${LOG_LEVEL}
    org.springframework.web: ${LOG_LEVEL}
    org.springframework.security: TRACE
    denzfa.cockpit: ${LOG_LEVEL}
